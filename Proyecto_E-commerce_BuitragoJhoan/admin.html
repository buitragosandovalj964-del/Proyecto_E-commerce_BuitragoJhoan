<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXCLUSIVE GOLDEN | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container { padding: 40px 5%; display: none; }
        .login-card {
            max-width: 420px;
            margin: 90px auto;
            padding: 40px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            box-shadow: 0 18px 45px rgba(0,0,0,0.18);
        }
        .login-card h2 {
            font-family: var(--font-urban);
            font-size: 1.8rem;
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: 2px;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--bg-card); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: var(--accent); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        .admin-modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:4000;
        }
        .admin-modal-content { background:#151515; border:1px solid var(--accent); padding:30px; width:90%; max-width:500px; }
        .admin-header { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border-color); padding-bottom:20px; margin-bottom:30px; }
        .admin-header h1 { font-family: var(--font-urban); font-size: 2rem; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="loginScreen">
        <div class="login-card">
            <h2>EXCLUSIVE GOLDEN</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" class="input-premium" placeholder="E-mail Corporativo" value="admin@mail.com" required>
                <input type="password" id="loginPass" class="input-premium" placeholder="Contraseña" value="123456" required>
                <button type="submit" class="btn-premium" style="width:100%; margin-top:10px;">Acceder al Trono</button>
            </form>
        </div>
    </div>

    <div id="dashboardScreen" class="admin-container">
        <div class="admin-header">
            <h1>EXCLUSIVE GOLDEN</h1>
            <a href="index.html" class="btn-premium">Ver Tienda Pública</a>
        </div>

        <admin-nav></admin-nav>
        <div id="moduleContainer" style="margin-top:30px;"></div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/components/AdminNav.js"></script>
    <script src="js/components/CategoryManager.js"></script>
    <script src="js/components/ProductManager.js"></script>
    <script src="js/components/OrderManager.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if (email === 'admin@mail.com' && pass === '123456') {
                showToast('Acceso Concedido. Bienvenido, Diseñador.');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardScreen').style.display = 'block';
                switchModule('products');
            } else {
                showToast('Credenciales inválidas en la Maison.', true);
            }
        });

        function switchModule(moduleName) {
            const container = document.getElementById('moduleContainer');
            container.innerHTML = '';

            if (moduleName === 'categories') {
                container.innerHTML = '<category-manager></category-manager>';
            } else if (moduleName === 'products') {
                container.innerHTML = '<product-manager></product-manager>';
            } else if (moduleName === 'orders') {
                container.innerHTML = '<order-manager></order-manager>';
            }
        }
    </script>
</body>
</html>
