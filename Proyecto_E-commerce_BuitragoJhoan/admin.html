<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEBXZ_EXCLUSIVE | Admin Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/Proyecto_E-commerce_BuitragoJhoan/css/style.css">
    <style>
        body {
            background: #F7EFE5;
            color: #111111;
            min-height: 100vh;
        }

        .admin-container {
            padding: 40px 5%;
            display: none;
            max-width: 1280px;
            margin: 0 auto;
        }

        .login-card {
            max-width: 460px;
            margin: 90px auto;
            padding: 42px 36px;
            background: #FFFFFF;
            border: 1px solid rgba(17, 17, 17, 0.08);
            border-radius: 24px;
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.1);
        }

        .login-card h2 {
            font-family: var(--font-urban);
            font-size: 2rem;
            margin-bottom: 28px;
            text-align: center;
            letter-spacing: 0.2em;
            color: #111111;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #FFFFFF;
            border: 1px solid rgba(17, 17, 17, 0.08);
            border-radius: 18px;
            overflow: hidden;
        }

        th,
        td {
            padding: 18px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(17, 17, 17, 0.08);
            font-size: 0.94rem;
        }

        th {
            color: #706B63;
            text-transform: uppercase;
            font-size: 0.78rem;
            letter-spacing: 0.12em;
            background: #F4F1EA;
        }

        .admin-modal {
            position: fixed;
            inset: 0;
            background: rgba(17, 17, 17, 0.45);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 4000;
            padding: 20px;
        }

        .admin-modal-content {
            background: #FFFFFF;
            border: 1px solid rgba(17, 17, 17, 0.08);
            padding: 32px;
            width: min(520px, 100%);
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.1);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid rgba(17, 17, 17, 0.08);
            padding-bottom: 24px;
            margin-bottom: 32px;
        }

        .admin-header h1 {
            font-family: var(--font-urban);
            font-size: 2rem;
            letter-spacing: 0.12em;
            color: #111111;
        }

        .admin-header a,
        .admin-header button {
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div id="loginScreen">
        <div class="login-card">
            <h2>SEBXZ_EXCLUSIVE</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" class="input-premium" placeholder="E-mail Corporativo"
                    value="admin@mail.com" required>
                <input type="password" id="loginPass" class="input-premium" placeholder="Contraseña" value="123456"
                    required>
                <button type="submit" class="btn-premium" style="width:100%; margin-top:10px;">Acceder al Trono</button>
            </form>
        </div>
    </div>

    <div id="dashboardScreen" class="admin-container">
        <div class="admin-header">
            <h1>SEBXZ_EXCLUSIVE</h1>
            <div style="display:flex; gap:10px; align-items:center;">
                <a href="/Proyecto_E-commerce_BuitragoJhoan/index.html" class="btn-premium">Ver Tienda Pública</a>
                <button id="logoutBtn" class="btn-danger">Cerrar Sesión</button>
            </div>
        </div>

        <admin-nav></admin-nav>
        <div id="moduleContainer" style="margin-top:30px;"></div>
    </div>

    <script src="/Proyecto_E-commerce_BuitragoJhoan/js/app.js"></script>
    <script src="/Proyecto_E-commerce_BuitragoJhoan/js/components/AdminNav.js"></script>
    <script src="/Proyecto_E-commerce_BuitragoJhoan/js/components/CategoryManager.js"></script>
    <script src="/Proyecto_E-commerce_BuitragoJhoan/js/components/ProductManager.js"></script>
    <script src="/Proyecto_E-commerce_BuitragoJhoan/js/components/OrderManager.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginScreen = document.getElementById('loginScreen');
            const dashboardScreen = document.getElementById('dashboardScreen');
            const loginForm = document.getElementById('loginForm');
            const logoutBtn = document.getElementById('logoutBtn');

            const showDashboard = () => {
                loginScreen.style.display = 'none';
                dashboardScreen.style.display = 'block';
                switchModule('products');
            };

            const signOut = () => {
                localStorage.removeItem('adminLoggedIn');
                loginScreen.style.display = 'block';
                dashboardScreen.style.display = 'none';
            };

            if (localStorage.getItem('adminLoggedIn') === 'true') {
                showDashboard();
            }

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value.trim();
                const pass = document.getElementById('loginPass').value.trim();

                if (email === 'admin@mail.com' && pass === '123456') {
                    localStorage.setItem('adminLoggedIn', 'true');
                    showToast('Acceso Concedido. Bienvenido, Diseñador.');
                    showDashboard();
                } else {
                    showToast('Credenciales inválidas en la Maison.', true);
                }
            });

            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    signOut();
                    showToast('Sesión cerrada correctamente.');
                });
            }

            function switchModule(moduleName) {
                const container = document.getElementById('moduleContainer');
                container.innerHTML = '';

                if (moduleName === 'categories') {
                    container.innerHTML = '<category-manager></category-manager>';
                } else if (moduleName === 'products') {
                    container.innerHTML = '<product-manager></product-manager>';
                } else if (moduleName === 'orders') {
                    container.innerHTML = '<order-manager></order-manager>';
                }
            }

            window.switchModule = switchModule;
            window.addEventListener('adminModuleChange', (event) => {
                if (event?.detail?.moduleName) {
                    switchModule(event.detail.moduleName);
                }
            });
        });
    </script>
</body>

</html>
